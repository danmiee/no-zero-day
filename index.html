  html, body { margin: 0; height: 100%; background: var(--bg); font-family: var(--ui); transition: background .35s ease; }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #phone { transform-origin: center; }
  .tap { cursor: pointer; transition: transform .08s ease, filter .12s ease; -webkit-tap-highlight-color: transparent; }
  .tap:hover { filter: brightness(0.985); }
  .tap:active { transform: scale(0.975); }
  @keyframes wfslide { from { opacity: 0; transform: translateX(14px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes buddyPop { 0% { transform: scale(0.6); opacity: 0; } 60% { transform: scale(1.12); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes livePulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }

<body>
<div id="stage"><div id="phone"><div id="root"></div></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="app-ui.jsx"></script>
<script type="text/babel" src="app-flows.jsx"></script>
<script type="text/babel" src="app-tabs.jsx"></script>

<script type="text/babel">
const W = 402, H = 860;

function App() {
  return <IOSDevice width={W} height={H}><Prototype /></IOSDevice>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// fit the fixed-size phone into any viewport
function fitPhone() {
  const el = document.getElementById('phone');
  if (!el) return;
  const vw = window.innerWidth, vh = window.innerHeight;
  if (!vw || !vh) return; // ignore pre-layout ticks where dims are 0
  const s = Math.max(0.1, Math.min(1, (vh - 40) / H, (vw - 40) / W));
  el.style.transform = 'scale(' + s + ')';
}
window.addEventListener('resize', fitPhone);
window.addEventListener('load', fitPhone);
if (window.ResizeObserver) new ResizeObserver(fitPhone).observe(document.documentElement);
requestAnimationFrame(fitPhone);
requestAnimationFrame(() => requestAnimationFrame(fitPhone));
fitPhone();
</script>
</body>
