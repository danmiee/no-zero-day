<style>

    --bg: oklch(0.962 0.032 138);
    --screen-bg: linear-gradient(180deg, oklch(0.984 0.022 132) 0%, oklch(0.95 0.035 145) 100%);
    --card: oklch(0.997 0.006 120);
    --surface: color-mix(in oklch, var(--card) 88%, var(--mint-soft));
    --ink: oklch(0.275 0.04 145);
    --muted: oklch(0.47 0.04 145);
    --faint: oklch(0.64 0.036 145);
    --line: oklch(0.86 0.032 140);

    --lav: oklch(0.9 0.058 126);
    --lav-ink: oklch(0.38 0.09 132);
    --mint: oklch(0.88 0.08 153);
    --mint-ink: oklch(0.34 0.09 154);
    --mint-soft: oklch(0.94 0.04 146);
    --peach: oklch(0.91 0.07 83);
    --peach-ink: oklch(0.45 0.095 80);
    --peach-soft: oklch(0.965 0.035 92);
    --sky: oklch(0.9 0.045 190);
    --sky-ink: oklch(0.4 0.08 185);
    --mascot: oklch(0.86 0.09 142);

    --ui: "Pretendard", "Pretendard Variable", -apple-system, system-ui, sans-serif;
    --mono: "Spline Sans Mono", ui-monospace, monospace;
    --radius-card: 18px;
    --radius-button: 14px;
    --radius-chip: 12px;
    --shadow-sm: 0 1px 2px rgba(35,76,47,0.06), 0 9px 24px rgba(35,76,47,0.07);
    --shadow-md: 0 2px 5px rgba(35,76,47,0.07), 0 18px 44px rgba(35,76,47,0.1);

    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }
  /* 탐험 — field notes, map paper, lively route markers */
  html[data-theme="exploration"] {
    --bg: oklch(0.952 0.018 92);
    --screen-bg: linear-gradient(180deg, oklch(0.985 0.022 96) 0%, oklch(0.93 0.028 88) 100%);
    --card: oklch(0.992 0.014 94);
    --surface: color-mix(in oklch, var(--card) 88%, var(--sky));
    --ink: oklch(0.3 0.035 80);
    --muted: oklch(0.49 0.035 86);
    --faint: oklch(0.65 0.032 90);
    --line: oklch(0.83 0.03 92);
    --lav: oklch(0.87 0.055 84);
    --lav-ink: oklch(0.39 0.085 78);
    --mint: oklch(0.84 0.052 178);
    --mint-ink: oklch(0.34 0.075 188);
    --mint-soft: oklch(0.94 0.025 176);
    --peach: oklch(0.86 0.062 72);
    --peach-ink: oklch(0.41 0.085 64);
    --peach-soft: oklch(0.948 0.026 82);
    --sky: oklch(0.89 0.052 224);
    --sky-ink: oklch(0.36 0.08 224);
    --mascot: oklch(0.84 0.075 76);
    --mascot-ink: oklch(0.33 0.08 68);
    --mascot-accent: oklch(0.82 0.09 220);
    --radius-card: 10px;
    --radius-button: 12px;
    --radius-chip: 10px;
    --shadow-sm: 0 1px 1px rgba(86,58,27,0.07), 0 10px 26px rgba(86,58,27,0.08);
    --shadow-md: 0 3px 5px rgba(86,58,27,0.08), 0 20px 42px rgba(86,58,27,0.12);
  }
  /* 카페 — warm counter, espresso lines, quiet focus */
  html[data-theme="cafe"] {
    --bg: oklch(0.865 0.035 54);
    --screen-bg: linear-gradient(180deg, oklch(0.935 0.035 62) 0%, oklch(0.81 0.048 48) 100%);
    --card: oklch(0.958 0.025 67);
    --surface: color-mix(in oklch, var(--card) 82%, oklch(0.72 0.06 47));
    --ink: oklch(0.23 0.045 43);
    --muted: oklch(0.41 0.045 45);
    --faint: oklch(0.57 0.042 48);
    --line: oklch(0.72 0.042 54);
    --lav: oklch(0.72 0.075 45);
    --lav-ink: oklch(0.25 0.06 38);
    --mint: oklch(0.78 0.045 122);
    --mint-ink: oklch(0.28 0.055 118);
    --mint-soft: oklch(0.9 0.026 86);
    --peach: oklch(0.76 0.085 58);
    --peach-ink: oklch(0.25 0.06 42);
    --peach-soft: oklch(0.89 0.045 66);
    --sky: oklch(0.76 0.036 214);
    --sky-ink: oklch(0.28 0.052 214);
    --mascot: oklch(0.68 0.07 50);
    --mascot-ink: oklch(0.22 0.055 40);
    --mascot-accent: oklch(0.88 0.05 72);
    --radius-card: 8px;
    --radius-button: 10px;
    --radius-chip: 999px;
    --shadow-sm: 0 1px 2px rgba(70,45,26,0.08), 0 8px 20px rgba(70,45,26,0.08);
    --shadow-md: 0 3px 6px rgba(70,45,26,0.09), 0 18px 38px rgba(70,45,26,0.13);
  }
  * { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; overflow: hidden; background: var(--bg); font-family: var(--ui); transition: background .35s ease; }
  #root { width: 100%; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
  .tap { cursor: pointer; transition: transform .08s ease, filter .12s ease; -webkit-tap-highlight-color: transparent; }
  .tap:hover { filter: brightness(0.985); }
  .tap:active { transform: scale(0.975); }
  @keyframes wfslide { from { opacity: 0; transform: translateX(14px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes buddyPop { 0% { transform: scale(0.6); opacity: 0; } 60% { transform: scale(1.12); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes livePulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }
  @media (prefers-reduced-motion: reduce) { [style*="wfslide"], [style*="buddyPop"] { animation: none !important; } }
</style>
